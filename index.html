<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Anniversary - Mi Amor Chel</title>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family: 'Georgia', serif;

}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    background:

        linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.35)),

        url('B2E36D7D-DBF6-4B82-BE45-F486778B59E3.jpeg');

    background-size:cover;

    background-position:center;

}

/* Floating Hearts */

.heart{

    position:absolute;

    color:#ffd700;

    opacity:.8;

    animation:float 8s linear infinite;

    z-index:1;

}

@keyframes float{

    from{

        transform:translateY(100vh) scale(0);

    }

    to{

        transform:translateY(-120vh) scale(1.5);

    }

}

/* Envelope */

.envelope-container{

    position:relative;

    width:340px;

    height:240px;

    cursor:pointer;

    z-index:5;

}

.envelope{

    position:relative;

    width:100%;

    height:100%;

    background:#ffe8a3;

    border-radius:0 0 15px 15px;

    box-shadow:0 15px 35px rgba(0,0,0,.4);

}

/* Flap */

.flap{

    position:absolute;

    top:0;

    left:0;

    width:0;

    height:0;

    border-left:170px solid transparent;

    border-right:170px solid transparent;

    border-top:125px solid #ffd54f;

    transform-origin:top;

    transition:all 1.5s ease;

    z-index:10;

}

/* Letter */

.letter{

    position:absolute;

    left:20px;

    top:20px;

    width:300px;

    min-height:380px;

    background:rgba(255,255,255,.97);

    border-radius:20px;

    padding:30px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,.3);

    transform:translateY(100px);

    opacity:0;

    transition:all 2s ease;

    z-index:3;

}

.open .flap{

    transform:rotateX(180deg);

    z-index:0;

}

.open .letter{

    transform:translateY(-180px);

    opacity:1;

    z-index:20;

}

.message{

    opacity:0;

    transform:translateY(30px);

}

.show .message{

    animation:fadeUp 1.5s forwards;

}

.show .message:nth-child(2){animation-delay:.8s;}

.show .message:nth-child(3){animation-delay:1.6s;}

.show .message:nth-child(4){animation-delay:2.4s;}

.show .message:nth-child(5){animation-delay:3.2s;}

@keyframes fadeUp{

    to{

        opacity:1;

        transform:translateY(0);

    }

}

h1{

    color:#c99a00;

    margin-bottom:15px;

}

.special{

    font-size:55px;

    color:#e0a800;

    font-weight:bold;

    margin-bottom:20px;

}

p{

    color:#555;

    font-size:20px;

    margin:12px 0;

}

.roses{

    font-size:45px;

    margin-top:20px;

}

.click-text{

    position:absolute;

    width:100%;

    bottom:-50px;

    text-align:center;

    color:white;

    font-size:20px;

    text-shadow:0 0 10px black;

    animation:pulse 1.5s infinite;

}

@keyframes pulse{

    50%{transform:scale(1.08);}

}

</style>

</head>

<body>

<div class="envelope-container" id="envelope">

    <div class="envelope">

        <div class="flap"></div>

        <div class="letter" id="letter">

            <h1 class="message">💛 Happy Anniversary 💛</h1>

            <div class="message special">

                5 + 6 ✨

            </div>

            <p class="message">

                Mi Amor Chel ❤️

            </p>

            <p class="message">

                Every moment with you is a beautiful memory.

            </p>

            <div class="message roses">

                🌹 &nbsp;&nbsp; 🌹

            </div>

        </div>

    </div>

    <div class="click-text">

        💌 Click to Open Your Letter 💌

    </div>

</div>

<script>

// Open Envelope

const envelope = document.getElementById("envelope");

const letter = document.getElementById("letter");

envelope.addEventListener("click", () => {

    envelope.classList.add("open");

    setTimeout(()=>{

        letter.classList.add("show");

    },1500);

}, { once:true });

// Floating Hearts

function createHeart(){

    const heart=document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML="💛";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(15+Math.random()*25)+"px";

    heart.style.animationDuration=(5+Math.random()*5)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),10000);

}

setInterval(createHeart,300);

</script>

</body>

</html>
